name: Deploy App

on:
  push:
    branches:
      - main

      
jobs:
  prepare-env:
    runs-on: [self-hosted] # Укажите ваш раннер (тот же, где деплой)
    steps:
      - name: Create .env file
        run: |
          # Переходим в папку проекта и записываем секрет в .env
          mkdir -p ${{vars.DEPLOY_PATH}}/Disk
          echo "PG_PASS=${{ secrets.MYSQL_PASSWORD }}" > ${{vars.DEPLOY_PATH}}/Disk/.env 
          echo "PG_PASS=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> ${{vars.DEPLOY_PATH}}/Disk/.env 

  call-deploy:
    needs: [prepare-env]
    uses: leoserverteam/DevOpsTemplates/.github/workflows/onlycompose.yml@main
    with:
      project_name: "Disk"

  call-nginx:
    needs: [call-deploy]
    uses: leoserverteam/DevOpsTemplates/.github/workflows/deploynginx.yml@main
